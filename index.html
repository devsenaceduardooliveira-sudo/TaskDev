<!doctype html>
<html lang="pt-br">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="/js/main.js" defer type="module"></script>
    <title>TaskDev</title>
  </head>
  <body>
    <div class="app login-screen" id="login-screen">
      <header class="app-header">
        <h1>TaskDev</h1>
      </header>

      <main class="app-content">
        <form id="form-login" aria-label="Login do TaskDev">
          <h2>Entrar</h2>
          <input
            type="text"
            id="input-login"
            placeholder="Seu nome"
            aria-label="Nome de usuário"
          />
          <input
            type="password"
            id="input-senha"
            placeholder="Senha"
            aria-label="Senha"
          />
          <button type="submit">Entrar</button>
          <p id="mensagem-login" role="status" aria-live="polite"></p>
        </form>
      </main>
    </div>

    <div class="app task-screen hidden" id="task-screen">
      <header class="app-header">
        <h1>TaskDev</h1>
      </header>

      <main class="app-content">
        <div class="app-toolbar">
          <p id="welcome-usuario"></p>
          <button type="button" id="logout-btn">Sair</button>
        </div>

        <form id="form-tarefa" aria-label="Adicionar nova tarefa">
          <input
            type="text"
            id="input-tarefa"
            placeholder="Digite uma tarefa..."
            aria-label="Descrição da tarefa"
          />
          <button type="submit">Adicionar</button>
        </form>

        <p id="mensagem" role="status" aria-live="polite"></p>

        <ul id="lista-tarefas" aria-label="Lista de tarefas"></ul>

        <p id="dica"></p>
      </main>
    </div>
  </body>
</html>
